name: Release VS Code Extension

on:
  push:
    branches: [master]
    paths:
      - "extension/**"
  workflow_dispatch:

concurrency:
  group: release-extension
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    name: Check extension version
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      release_name: ${{ steps.metadata.outputs.releaseName }}
      changelog: ${{ steps.metadata.outputs.changelog }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read release metadata
        id: metadata
        run: node .github/scripts/release-metadata.mjs extension

      - name: Check scoped release tag
        id: gate
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "### Release skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "\`$TAG\` already exists. No build or release was created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "### Release required" >> "$GITHUB_STEP_SUMMARY"
            echo "\`$TAG\` is not published yet." >> "$GITHUB_STEP_SUMMARY"
          fi

  release:
    name: Build and release extension
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24.11.0
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Test extension
        working-directory: extension
        run: npm test

      - name: Package VSIX
        working-directory: extension
        env:
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          mkdir -p release
          npx --yes @vscode/vsce@3.9.2 package --no-dependencies --out "release/copilot-monitor-extension-$VERSION.vsix"
          sha256sum "release/copilot-monitor-extension-$VERSION.vsix" > "release/copilot-monitor-extension-$VERSION.vsix.sha256"

      - name: Publish to VS Code Marketplace
        working-directory: extension
        env:
          VERSION: ${{ needs.gate.outputs.version }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          [[ -n "$VSCE_PAT" ]] || { echo "::error::Add the VSCE_PAT repository secret."; exit 1; }
          npx --yes @vscode/vsce@3.9.2 publish --packagePath "release/copilot-monitor-extension-$VERSION.vsix" --skip-duplicate

      - name: Extract release notes
        run: node .github/scripts/extract-changelog.mjs "${{ needs.gate.outputs.changelog }}" "${{ needs.gate.outputs.version }}" extension/release/notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.gate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.gate.outputs.release_name }}
          body_path: extension/release/notes.md
          fail_on_unmatched_files: true
          files: |
            extension/release/copilot-monitor-extension-${{ needs.gate.outputs.version }}.vsix
            extension/release/copilot-monitor-extension-${{ needs.gate.outputs.version }}.vsix.sha256
